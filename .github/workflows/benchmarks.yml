# GitHub Actions workflow for performance benchmarks
# Non-blocking - records performance data without failing PRs

name: Benchmarks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: macos-15
    continue-on-error: true  # Non-blocking - don't fail PRs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: '6.2.4'

      - name: Swift Version
        run: swift --version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-benchmark-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-benchmark-
            ${{ runner.os }}-spm-

      - name: Build Benchmarks (Release)
        run: swift build -c release --target Benchmarks

      - name: Run Benchmarks
        id: benchmarks
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          swift run -c release Benchmarks 2>&1 | tee benchmark-output.txt
          cat benchmark-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run Benchmarks (JSON)
        run: |
          swift run -c release Benchmarks --format json > benchmark-results.json 2>&1 || true

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            benchmark-output.txt
            benchmark-results.json
          retention-days: 90
