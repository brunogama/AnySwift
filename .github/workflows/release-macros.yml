name: Release Macro Artifact Bundle

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PRODUCT: InvariantSwiftMacros

jobs:
  build-macro-macos:
    name: Build macro (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build arm64
        run: |
          swift build -c release --product $PRODUCT --triple arm64-apple-macosx
          codesign --sign - --force .build/arm64-apple-macosx/release/$PRODUCT

      - name: Build x86_64
        run: |
          swift build -c release --product $PRODUCT --triple x86_64-apple-macosx
          codesign --sign - --force .build/x86_64-apple-macosx/release/$PRODUCT

      - uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            .build/arm64-apple-macosx/release/${{ env.PRODUCT }}
            .build/x86_64-apple-macosx/release/${{ env.PRODUCT }}
          retention-days: 1

  build-macro-linux:
    name: Build macro (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - name: Build Linux x86_64
        run: swift build -c release --product $PRODUCT

      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: .build/release/${{ env.PRODUCT }}
          retention-days: 1

  package-artifact-bundle:
    name: Package and release
    needs: [build-macro-macos, build-macro-linux]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: macos-binaries
          path: artifacts/macos

      - uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: artifacts/linux

      - name: Locate binaries
        id: bins
        run: |
          MACOS_ARM64=$(find artifacts/macos -path "*arm64*/$PRODUCT" -type f | head -1)
          MACOS_X86=$(find artifacts/macos -path "*x86_64*/$PRODUCT" -type f | head -1)
          LINUX_X86=$(find artifacts/linux -name "$PRODUCT" -type f | head -1)
          chmod +x "$MACOS_ARM64" "$MACOS_X86" "$LINUX_X86"
          echo "macos_arm64=$MACOS_ARM64" >> "$GITHUB_OUTPUT"
          echo "macos_x86_64=$MACOS_X86" >> "$GITHUB_OUTPUT"
          echo "linux_x86_64=$LINUX_X86" >> "$GITHUB_OUTPUT"

      - name: Build artifact bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          Tools/packaging/build-macro-artifactbundle.sh "$VERSION" --ci \
            --macos-arm64 "${{ steps.bins.outputs.macos_arm64 }}" \
            --macos-x86_64 "${{ steps.bins.outputs.macos_x86_64 }}" \
            --linux-x86_64 "${{ steps.bins.outputs.linux_x86_64 }}"

      - name: Compute checksum
        id: checksum
        run: |
          ZIP=".build/artifact-bundle/$PRODUCT.artifactbundle.zip"
          CHECKSUM=$(swift package compute-checksum "$ZIP")
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.checksum.outputs.zip }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp Package.binary.swift and push
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CHECKSUM="${{ steps.checksum.outputs.checksum }}"
          sed -i '' "s|__VERSION__|${GITHUB_REF_NAME}|g" Package.binary.swift
          sed -i '' "s|__CHECKSUM__|${CHECKSUM}|g" Package.binary.swift
          cp Package.swift Package.dev.swift
          cp Package.binary.swift Package.swift
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift Package.dev.swift Package.binary.swift
          git commit -m "release($VERSION): stamp binary manifest with checksum"
          git push origin HEAD:refs/tags/${GITHUB_REF_NAME} --force
