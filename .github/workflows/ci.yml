name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # MARK: - Workspace Sub-Package Builds (Parallel)
  # These jobs build the sub-packages independently for faster CI

  build-core:
    name: Build Core (No SwiftSyntax)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            Packages/InvariantSwiftCore/.build
          key: swiftpm-core-${{ runner.os }}-${{ hashFiles('Packages/InvariantSwiftCore/**/*.swift') }}
          restore-keys: |
            swiftpm-core-${{ runner.os }}-
      - name: Build InvariantSwiftCore
        run: swift build --package-path Packages/InvariantSwiftCore
      - name: Test InvariantSwiftCore
        run: swift test --package-path Packages/InvariantSwiftCore

  build-macros:
    name: Build Macros (SwiftSyntax)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Cache SwiftSyntax Prebuilts
        uses: actions/cache@v4
        with:
          path: ~/.swiftpm/swift-syntax-prebuilts
          key: swift-syntax-prebuilts-${{ runner.os }}
      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            Packages/InvariantSwiftMacros/.build
          key: swiftpm-macros-${{ runner.os }}-${{ hashFiles('Packages/InvariantSwiftMacros/**/*.swift') }}
          restore-keys: |
            swiftpm-macros-${{ runner.os }}-
      - name: Build InvariantSwiftMacros with Prebuilts
        run: swift build --package-path Packages/InvariantSwiftMacros --enable-experimental-prebuilts
      # NOTE: Tests not migrated yet - uncomment when ready
      # - name: Test InvariantSwiftMacros
      #   run: swift test --package-path Packages/InvariantSwiftMacros --enable-experimental-prebuilts

  # MARK: - Linux Tests
  swift-test-linux:
    name: swift test (Linux)
    runs-on: ubuntu-latest
    container:
      image: swift:6.2-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Test on Linux
        run: swift test | xcbeautify || true

  macro-golden-tests:
    name: Macro Golden Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Setup Swift 6.2.4
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: '6.2.4'
      - name: Run Macro Golden Tests
        run: swift test --filter MacroGoldenTests

  # MARK: - Integration Tests (after sub-packages build)
  integration:
    name: Integration Tests
    runs-on: macos-15
    needs: [build-core, build-macros]
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Setup Swift 6.2.4
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: '6.2.4'
      - name: Cache SwiftSyntax Prebuilts
        uses: actions/cache@v4
        with:
          path: ~/.swiftpm/swift-syntax-prebuilts
          key: swift-syntax-prebuilts-${{ runner.os }}
      - name: Build Full Package with Prebuilts
        run: swift build --enable-experimental-prebuilts
      - name: Run Integration Tests
        run: swift test --filter CoverageIntegrationTests --enable-experimental-prebuilts || true

  # MARK: - Xcode Platform Tests
  xcodebuild-latest:
    name: xcodebuild (16.4)
    runs-on: macos-15
    strategy:
      matrix:
        command: [test, '']
        platform: [IOS, MACOS, TVOS]
        xcode: ['16.4']
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode ${{ matrix.xcode }}
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app
      - name: Setup Swift 6.2.4
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: '6.2.4'
      - name: Export Swift toolchain for xcodebuild
        run: |
          SWIFT_TOOLCHAIN_PATH="$(swiftly use --print-location)"
          TOOLCHAIN_ID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$SWIFT_TOOLCHAIN_PATH/Info.plist")"
          echo "TOOLCHAINS=$TOOLCHAIN_ID" >> "$GITHUB_ENV"
          echo "Using Swift toolchain: $TOOLCHAIN_ID"
      - name: Update xcbeautify
        run: brew update && brew upgrade xcbeautify
      - name: List available devices
        run: xcrun simctl list devices available
      - name: Cache derived data
        uses: actions/cache@v4
        with:
          path: |
            ~/.derivedData
          key: |
            deriveddata-xcodebuild-${{ matrix.platform }}-${{ matrix.xcode }}-${{ matrix.command }}-${{ hashFiles('**/Sources/**/*.swift', '**/Tests/**/*.swift') }}
          restore-keys: |
            deriveddata-xcodebuild-${{ matrix.platform }}-${{ matrix.xcode }}-${{ matrix.command }}-
      - name: Set IgnoreFileSystemDeviceInodeChanges flag
        run: defaults write com.apple.dt.XCBuild IgnoreFileSystemDeviceInodeChanges -bool YES
      - name: Update mtime for incremental builds
        uses: chetan/git-restore-mtime-action@v2
      - name: Build and Test
        run: |
          if [ "${{ matrix.command }}" = "test" ]; then
            case "${{ matrix.platform }}" in
              IOS)
                set -o pipefail
                xcodebuild test \
                  -scheme InvariantSwift \
                  -toolchain "$TOOLCHAINS" \
                  -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
                  | xcbeautify
                ;;
              MACOS)
                set -o pipefail
                xcodebuild test \
                  -scheme InvariantSwift \
                  -toolchain "$TOOLCHAINS" \
                  -destination 'platform=macOS' \
                  | xcbeautify
                ;;
              TVOS)
                set -o pipefail
                xcodebuild test \
                  -scheme InvariantSwift \
                  -toolchain "$TOOLCHAINS" \
                  -destination 'platform=tvOS Simulator,name=Apple TV 4K (3rd generation),OS=latest' \
                  | xcbeautify
                ;;
            esac
          else
            swift build --enable-experimental-prebuilts
          fi

  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint

  format-check:
    name: swift-format
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install swift-format
        run: brew install swift-format
      - name: Check formatting
        run: |
          # Create a copy to check formatting
          cp -r . /tmp/original
          # Apply formatting
          swift-format -i --configuration .swift-format --recursive \
            ./Package.swift ./Sources ./Tests
          # Check if any files were modified
          if ! git diff --quiet; then
            echo "❌ Code is not formatted. Run 'make format' to fix."
            echo "Files that need formatting:"
            git diff --name-only
            git diff
            exit 1
          else
            echo "✅ All code is properly formatted"
          fi

  coverage:
    name: Code Coverage
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: '6.2.4'
      - name: Swift Version
        run: swift --version
      - name: Run tests with coverage
        run: swift test --enable-code-coverage
      - name: Generate coverage report
        run: |
          TEST_BINARY="$(find .build -path '*InvariantSwiftPackageTests.xctest/Contents/MacOS/InvariantSwiftPackageTests' -type f | head -1)"
          if [ -z "$TEST_BINARY" ]; then
            echo "Unable to locate InvariantSwiftPackageTests binary for coverage export"
            exit 1
          fi
          xcrun llvm-cov export -format="lcov" \
            "$TEST_BINARY" \
            -instr-profile .build/debug/codecov/default.profdata > coverage.lcov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.lcov
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
