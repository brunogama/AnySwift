# SwiftLint Configuration - Fixed for compatibility with swift-format
# Based on Google Swift Style Guide
# https://google.github.io/swift/

# Paths to include
included:
- Sources
- Benchmarks
- Tests

# Paths to exclude
excluded:
- .build
- .swiftpm
- Package.swift
- Tools
- ${PWD}/.build
- Sources/InvariantSwiftMacros/RuleBasedTestMacro  # AST builders are inherently verbose
- Sources/FuncTestCLI  # CLI tools use print statements
- Sources/GhostwriterCLI  # CLI tools use print statements
- Tests/InvariantSwiftMacroTests/Resources  # Macro expansion output
- Packages/InvariantSwiftMacros/Tests/InvariantSwiftMacroTests/Resources  # Macro expansion output

# Enabled rules beyond default
opt_in_rules:
# Readability
- attributes
- closure_end_indentation
- closure_spacing
- collection_alignment
- contains_over_filter_count
- contains_over_filter_is_empty
- contains_over_first_not_nil
- contains_over_range_nil_comparison
- empty_collection_literal
- empty_count
- empty_string
- empty_xctest_method
- explicit_init
- fallthrough
- fatal_error_message
# - file_header  # Disabled for now
- file_name_no_space
- first_where
- flatmap_over_map_reduce
- identical_operands
- implicit_return
- joined_default_parameter
- last_where
- literal_expression_end_indentation
- lower_acl_than_parent
- modifier_order
- multiline_arguments
- multiline_function_chains
- multiline_literal_brackets
- multiline_parameters
- multiline_parameters_brackets
- operator_usage_whitespace
- optional_enum_case_matching
- overridden_super_call
- prefer_self_type_over_type_of_self
- prefer_zero_over_explicit_init
- private_action
- private_outlet
- prohibited_super_call
- redundant_nil_coalescing
- redundant_type_annotation
- single_test_class
- sorted_first_last
- static_operator
- toggle_bool
- unavailable_function
- unneeded_parentheses_in_closure_argument
- unowned_variable_capture
- untyped_error_in_catch
- vertical_parameter_alignment_on_call
# REMOVED: vertical_whitespace_closing_braces - conflicts with swift-format
# REMOVED: vertical_whitespace_opening_braces - conflicts with swift-format
- yoda_condition

# Performance
- array_init
- discouraged_object_literal
- enum_case_associated_values_count
- reduce_into

# Style (Google-specific)
- closure_parameter_position
- implicit_getter
# REMOVED: number_separator - conflicts with swift-format number formatting
- object_literal
- operator_whitespace
- prefer_self_in_static_references
# - sorted_imports  # Disabled to prevent conflict with SwiftFormat
# - trailing_comma  # Disabled to prevent conflict with SwiftFormat
- type_contents_order
- vertical_whitespace_between_cases

# Disabled rules (conflicts with Google style and SwiftFormat)
disabled_rules:
- trailing_whitespace # Google allows trailing whitespace in some cases
- todo # TODOs are allowed
- trailing_comma # Handled by SwiftFormat
- sorted_imports # Handled by SwiftFormat
- type_contents_order # Too strict for SwiftUI projects
- multiline_parameters # Conflicts with SwiftUI ViewBuilder syntax
- opening_brace # CRITICAL: Conflicts with swift-format brace placement
- vertical_whitespace_opening_braces # CRITICAL: Conflicts with swift-format
- vertical_whitespace_closing_braces # CRITICAL: Conflicts with swift-format
- number_separator # CRITICAL: Conflicts with swift-format number formatting
- orphaned_doc_comment # False positives from swiftlint:disable comments

# Rule configurations
analyzer_rules:
- unused_declaration
- unused_import

# Custom configurations
line_length:
  warning: 100
  error: 100
  ignores_urls: true
  ignores_function_declarations: false
  ignores_comments: true
  ignores_interpolated_strings: true

# Identifier naming (Google style)
identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 40
    error: 50
  excluded:
  - id
  - ID
  - URL
  - url
  - to
  - by
  - at
  - in
  - on
  - or
  - as
  - is
  - of
  - up
  - i
  - j
  - k
  - x
  - y
  - z
  - r
  - g
  - b
  - a
  - n  # numeric value
  - f  # float/function
  - d  # double/delta
  - c  # character/count
  - s  # string/sequence
  - t  # time/type
  - p  # position/point
  - u  # value/unit
  - e  # element/error

type_name:
  min_length: 3
  max_length:
    warning: 40
    error: 50
  allowed_symbols: [ "_" ]
  validates_start_with_lowercase:
    warning: false

function_parameter_count:
  warning: 4
  error: 6

# File and type length limits (relaxed for existing code)
file_length:
  warning: 400
  error: 1000
  ignore_comment_only_lines: true

type_body_length:
  warning: 300
  error: 800

function_body_length:
  warning: 60
  error: 120

# Cyclomatic complexity (Google recommendation)
cyclomatic_complexity:
  warning: 10
  error: 15

# Nesting (Google recommends shallow nesting)
nesting:
  type_level: 2
  function_level: 3

# Attributes (Google style)
attributes:
  always_on_same_line:
  - "@IBAction"
  - "@NSManaged"
  - "@objc"
  - "@nonobjc"
  - "@IBOutlet"
  - "@IBInspectable"
  - "@GKInspectable"
  always_on_line_above:
  - "@available"
  - "@discardableResult"
  - "@UIApplicationMain"
  - "@NSApplicationMain"
  - "@main"
  - "@MainActor"
  - "@Sendable"

# Multiline arguments (Google style)
multiline_arguments:
  first_argument_location: next_line
  only_enforce_after_first_closure_on_first_line: true

# Vertical whitespace - reduced to prevent conflicts
vertical_whitespace:
  max_empty_lines: 2

# Empty count
empty_count:
  severity: warning

# Custom rules
custom_rules:
  # Prefer struct over class when possible
  prefer_struct:
    name: "Prefer Struct"
    regex: "^class\\s+\\w+[^\\{]*\\{"
    message: "Consider using a struct instead of a class when possible"
    severity: warning

  # No print statements in production code
  no_print:
    name: "No Print Statements"
    regex: "\\bprint\\("
    message: "Remove print statements from production code"
    severity: warning
    excluded:
    - "Tests/*"
    - "Benchmarks/*"
    - "Sources/MeridianCLI/*"
    - "Sources/MeridianREPL/*"
    - "Sources/PropertyTestDemo/*"
    - "Sources/SimplePropertyTestDemo/*"

# Reporter type
reporter: "xcode"
