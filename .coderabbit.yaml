# CodeRabbit Configuration for Swift Projects
# Complete reference: https://docs.coderabbit.ai/reference/configuration

language: "en-US"
tone_instructions: "Focus on Swift best practices, iOS/macOS development patterns, and Apple's Swift API Design Guidelines."
early_access: true
enable_free_tier: true

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: false
  auto_title_placeholder: "@coderabbitai"
  auto_title_instructions: "Generate concise titles following conventional commits for Swift projects (feat:, fix:, refactor:, etc.)"
  review_status: true
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  auto_apply_labels: false
  suggested_reviewers: true
  auto_assign_reviewers: false
  poem: false

  # Swift-specific labeling instructions
  labeling_instructions:
    - "Use 'ios' label for iOS-specific changes"
    - "Use 'macos' label for macOS-specific changes"
    - "Use 'watchos' label for watchOS-specific changes"
    - "Use 'tvos' label for tvOS-specific changes"
    - "Use 'spm' label for Swift Package Manager changes"
    - "Use 'ui' label for UI/SwiftUI related changes"
    - "Use 'core' label for business logic changes"
    - "Use 'networking' label for API/networking changes"
    - "Use 'testing' label for test-related changes"

  # Swift project path filters
  path_filters:
    - "**/*.swift"
    - "**/Package.swift"
    - "**/*.xcodeproj/**"
    - "**/*.xcworkspace/**"
    - "**/*.xib"
    - "**/*.storyboard"
    - "**/Podfile*"
    - "**/Cartfile*"
    - "!**/build/**"
    - "!**/DerivedData/**"
    - "!**/.build/**"
    - "!**/Pods/**"
    - "!**/Carthage/Build/**"

  # Swift-specific path instructions
  path_instructions:
    - path: "**/*.swift"
      instructions: "Focus on Swift conventions, optionals handling, memory management, protocol conformance, and Apple's Swift API Design Guidelines. Check for force unwrapping, retain cycles, and proper error handling."
    - path: "**/Package.swift"
      instructions: "Review Swift Package Manager configuration, dependencies versions, platform requirements, and package structure."
    - path: "**/*Tests.swift"
      instructions: "Ensure comprehensive test coverage, proper test isolation, meaningful assertions, and follow XCTest best practices."
    - path: "**/*View.swift"
      instructions: "Review SwiftUI view structure, state management, performance considerations, and accessibility compliance."
    - path: "**/ViewModel*.swift"
      instructions: "Check MVVM pattern implementation, ObservableObject conformance, @Published properties, and proper separation of concerns."
    - path: "**/Model*.swift"
      instructions: "Review data model design, Codable conformance, property initialization, and immutability where appropriate."

  abort_on_close: true
  disable_cache: false

  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords: ["wip", "draft", "poc", "prototype"]
    labels: []
    drafts: false
    base_branches: ["main", "develop", "release/*"]
    ignore_usernames: []

  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true

  pre_merge_checks:
    docstrings:
      mode: "warning"
      threshold: 70
    title:
      mode: "warning"
      requirements: "Title should follow conventional commits format and be under 50 characters. Use feat:, fix:, refactor:, test:, docs: prefixes."
    description:
      mode: "warning"
    issue_assessment:
      mode: "warning"
    custom_checks:
      - name: "Swift Version Compatibility"
        instructions: "Ensure code is compatible with the minimum Swift version specified in Package.swift or project settings."
      - name: "iOS Deployment Target"
        instructions: "Verify that used APIs are available in the minimum iOS deployment target."

  tools:
    swiftlint:
      enabled: true
      config_file: ".swiftlint.yml"
    github-checks:
      enabled: true
      timeout_ms: 120000
    languagetool:
      enabled: true
      enabled_rules: []
      disabled_rules: ["EN_UNPAIRED_BRACKETS", "EN_UNPAIRED_QUOTES"]
      disabled_categories: ["TYPOS", "TYPOGRAPHY", "CASING"]
      level: "default"
    markdownlint:
      enabled: true
    yamllint:
      enabled: true
    gitleaks:
      enabled: true
    actionlint:
      enabled: true
    osvScanner:
      enabled: true
    # Disable non-Swift tools
    ast-grep:
      essential_rules: false
    shellcheck:
      enabled: false
    ruff:
      enabled: false
    biome:
      enabled: false
    hadolint:
      enabled: false
    phpstan:
      enabled: false
    phpmd:
      enabled: false
    phpcs:
      enabled: false
    golangci-lint:
      enabled: false
    checkov:
      enabled: false
    detekt:
      enabled: false
    eslint:
      enabled: false
    flake8:
      enabled: false
    rubocop:
      enabled: false
    buf:
      enabled: false
    regal:
      enabled: false
    pmd:
      enabled: false
    cppcheck:
      enabled: false
    semgrep:
      enabled: false
    circleci:
      enabled: false
    clippy:
      enabled: false
    sqlfluff:
      enabled: false
    prismaLint:
      enabled: false
    pylint:
      enabled: false
    oxc:
      enabled: false
    shopifyThemeCheck:
      enabled: false
    luacheck:
      enabled: false
    brakeman:
      enabled: false
    dotenvLint:
      enabled: false
    htmlhint:
      enabled: false
    checkmake:
      enabled: false

chat:
  art: false
  auto_reply: true
  integrations:
    jira:
      usage: "auto"
    linear:
      usage: "auto"

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/.swiftlint.yml"
      - "**/.swiftformat"
      - "**/CONTRIBUTING.md"
      - "**/README.md"
      - "**/.cursorrules"
      - "**/.github/copilot-instructions.md"
      - "**/SWIFT_STYLE_GUIDE.md"
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
  jira:
    usage: "auto"
    project_keys: []
  linear:
    usage: "auto"
    team_keys: []
  pull_requests:
    scope: "auto"
  mcp:
    usage: "auto"
    disabled_servers: []

code_generation:
  docstrings:
    language: "en-US"
    path_instructions:
      - path: "**/*.swift"
        instructions: "Generate Swift-style documentation comments using /// syntax. Include parameter and return value descriptions. Follow Apple's documentation conventions."
      - path: "**/Package.swift"
        instructions: "Add clear descriptions for package, products, and dependencies."
  unit_tests:
    path_instructions:
      - path: "**/*.swift"
        instructions: "Generate XCTest-based unit tests using XCTestCase. Include setup/teardown, test isolation, meaningful test names, and comprehensive assertions. Use @testable import when needed."
      - path: "**/*View.swift"
        instructions: "Generate SwiftUI view tests focusing on state changes, user interactions, and accessibility testing."
      - path: "**/*ViewModel*.swift"
        instructions: "Generate tests for view model state changes, business logic, and data binding scenarios."
